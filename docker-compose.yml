version: "3.8"

services:
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  processor:
    build:
      context: ./services/processor
      dockerfile: Dockerfile
    container_name: processor
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - RAW_EVENTS_QUEUE=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/raw-events
      - PROCESSED_EVENTS_QUEUE=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/processed-events
      - PROCESSOR_ID=processor-instance-1
      - WORKER_COUNT=5
    restart: on-failure

  aggregator:
    build:
      context: ./services/aggregator
      dockerfile: Dockerfile
    container_name: aggregator
    depends_on:
      localstack:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PROCESSED_EVENTS_QUEUE=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/processed-events
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - EVENTS_TABLE=events
      - SUMMARY_TABLE=developer_summary
      - API_PORT=8080
      - WORKER_COUNT=3
    restart: on-failure